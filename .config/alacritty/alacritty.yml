font:
  normal:
    family: Hack
    style: Regular
  bold:
    family: Hack
    style: Bold
  italic:
    family: Hack
    style: Italic
  size: 14

scrolling:
  history: 10000
  multiplier: 3

window:
  padding:
    x: 10
    y: 10
  title: Alacritty
  dynamic_title: true

draw_bold_text_with_bright_colors: true

colors:
  primary:
    background: '0x1c1c1c'
    foreground: '0xf0f0f0'
  normal:
    black: '0x262626'
    red: '0xff5555'
    green: '0x50fa7b'
    yellow: '0xf1fa8c'
    blue: '0x8484fe'
    magenta: '0xff79c6'
    cyan: '0x8be9fd'
    white: '0xbfbfbf'

  #Bright colors
  bright:
    black: '0x4d4d4d'
    red: '0xff6e67'
    green: '0x5af78e'
    yellow: '0xf4f99d'
    blue: '0xa9a9ff'
    magenta: '0xff92d0'
    cyan: '0x9aedfe'
    white: '0xe6e6e6'

background_opacity: 1

mouse_bindings:
  - { mouse: Middle, action: PasteSelection }

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: true

live_config_reload: true
